# kctx configuration (github.com/Piotr1215/kctx).
# Sources feed the M-x -> Ctrl-k pane picker.
configs:
  # Keep kctx's standard file discovery paths and add global connection files.
  include:
    - ~/.kube/config
    - ~/.kube/*.yml
    - ~/.kube/*.yaml
    - ~/.kube/configs/*.yml
    - ~/.kube/configs/*.yaml
    - ~/.kube/kctx/*.yml
    - ~/.kube/kctx/*.yaml
    - ~/.kube/kubie/*.yml
    - ~/.kube/kubie/*.yaml

sources:
  files:
    homelab: /home/decoder/dev/homelab/kubeconfig
  gke:
    loft-staging:
      project: loft-staging
      clusters:
        loft-staging-cluster:
          alias: mgmt
          endpoint: dns
        loft-staging-worker:
          alias: worker
          endpoint: dns
    loft-prod:
      project: loft-prod
      clusters:
        loft-prod-cluster:
          alias: mgmt
          endpoint: dns
        loft-prod-engineering:
          alias: eng
        loft-prod-worker-eu:
          alias: eu
        loft-prod-worker-na:
          alias: na
  vcluster_platform:
    # Map key is the platform host. Value points at the vcluster CLI login file.
    # exec_credentials: true -> kubeconfig uses `vcluster platform token` (JIT,
    # no static bearer token cached at rest).
    loft.rocks:
      config: ~/.vcluster/config.json
      exec_credentials: true
