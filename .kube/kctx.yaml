# kctx configuration (github.com/Piotr1215/kctx).
# Sources feed the M-x -> Ctrl-k pane picker.
configs:
  # Keep kctx's standard file discovery paths and add global connection files.
  include:
    - ~/.kube/config
    - ~/.kube/*.yml
    - ~/.kube/*.yaml
    - ~/.kube/configs/*.yml
    - ~/.kube/configs/*.yaml
    - ~/.kube/kctx/*.yml
    - ~/.kube/kctx/*.yaml
    - ~/.kube/kubie/*.yml
    - ~/.kube/kubie/*.yaml

health:
  # Cache successful probes briefly; every distinct material fingerprint is
  # probed before it can replace a pane's current working selection.
  max_age_seconds: 60
  timeout_seconds: 8
  require_healthy_on_select: true

sources:
  files:
    homelab: /home/decoder/dev/homelab/kubeconfig
  gke:
    loft-staging:
      project: loft-staging
      clusters:
        loft-staging-cluster:
          alias: mgmt
          endpoint: dns
        loft-staging-worker:
          alias: worker
          endpoint: dns
    loft-prod:
      project: loft-prod
      clusters:
        loft-prod-cluster:
          alias: mgmt
          endpoint: dns
        loft-prod-engineering:
          alias: eng
        loft-prod-worker-eu:
          alias: eu
        loft-prod-worker-na:
          alias: na
  vcluster_platform:
    # Map key is the platform host. Login material may come from a file or a
    # command that prints the vcluster CLI config.
    # exec_credentials: true -> kubeconfig uses `vcluster platform token` (JIT,
    # no static bearer token cached at rest).
    loft.rocks:
      # The complete CLI login is encrypted in pass and materialized only in
      # the private runtime directory for one provider invocation.
      config_command: [pass, show, work/kctx/vcluster/loft.rocks]
      exec_credentials: true
