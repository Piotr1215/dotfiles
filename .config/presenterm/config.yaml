defaults:
  theme: dark-wide
  max_columns_alignment: center
  max_rows_alignment: center
  max_columns: 200
  max_rows: 100

snippet:
  exec:
    enable: true
    custom:
      diagrams:
        filename: "diagram.sh"
        commands:
          - ["bash", "diagram.sh"]
  exec_replace:
    enable: true
  render:
    threads: 2

options:
  implicit_slide_ends: true

mermaid:
  # Render diagrams at 2x resolution so they fill the slide instead of
  # rendering tiny (presenterm shows the PNG at native size; default scale is 1).
  scale: 2
