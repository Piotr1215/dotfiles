[general]
import = ["/home/decoder/.config/alacritty/themes/dracula.toml"]
live_config_reload = true

[keyboard]
bindings = [
  { key = "P", chars = "\u0002w", mods = "Command" },
  { key = "I", chars = "\u001B[105;5u", mods = "Control" },
  { key = "Space", action = "ToggleViMode", mode = "~Search", mods = "Shift|Control" },
  { key = "Y", action = "Copy", mode = "Vi|~Search" },
  { key = "Insert", action = "Copy", mods = "Control" },
  { key = "Insert", action = "Paste", mods = "Shift" },
  { key = "H", action = "High", mode = "Vi|~Search", mods = "Shift" },
  { key = "M", action = "Middle", mode = "Vi|~Search", mods = "Shift" },
  { key = "L", action = "Low", mode = "Vi|~Search", mods = "Shift" },
  { key = "Return", chars = "\u001B\r", mods = "Shift" },
]


[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = true
mouse.enabled = true
binding = { key = "1", mods = "Control" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

# ctrl+2: open a file path anywhere on the line as a file in a tmux nvim split.
# Matches a file-like token (optional ./ ~ / prefix, optional dir/ segments, a
# name ending in a .ext) anywhere in the row, not just the last token, so a path
# mid-sentence (foo/bar.md. Ready...) still gets a hint. The match ends on the
# extension's alnum, so a trailing sentence delimiter (the period in bar.md.) is
# excluded; post_processing trims any other trailing punctuation as a backstop.
[[hints.enabled]]
regex = '(\.|~|/)?([A-Za-z0-9._-]+/)*[A-Za-z0-9._-]+\.[A-Za-z0-9]+'
post_processing = true
command = { program = "/usr/bin/tmux", args = ["split-window", "-h", "-c", "#{pane_current_path}", "sh", "-c", "nvim \"$0\""] }
binding = { key = "2", mods = "Control" }

# ctrl+3: jump the tmux client to an agent session named on the cockpit board.
# Matches a "jump:<ISSUE-ID>" token; __tmux_jump.sh resolves it to the live session.
[[hints.enabled]]
regex = "jump:[A-Za-z0-9._-]+"
command = { program = "/home/decoder/dev/dotfiles/scripts/__tmux_jump.sh", args = [] }
binding = { key = "3", mods = "Control" }

# ctrl+4: open a Linear issue id (TEAM-NUMBER) or a GitHub PR ref in the browser.
# Matches either a short PR ref (<owner>/<repo>#<n>) or a Linear id. The regex is
# broad; __linear_open.sh dispatches: PR refs become github.com/.../pull/<n>, and
# Linear ids are validated against the live team-key list (cached) so stray matches
# do not open a bogus page. Full https github PR URLs are already covered by ctrl+1.
[[hints.enabled]]
regex = "[A-Za-z0-9._-]+/[A-Za-z0-9._-]+#[0-9]+|[A-Z][A-Z0-9]{1,9}-[0-9]+"
command = { program = "/home/decoder/dev/dotfiles/scripts/__linear_open.sh", args = [] }
binding = { key = "4", mods = "Control" }

[cursor.style]
shape = "Beam"

[env]
__GL_SYNC_TO_VBLANK = "0"
TERM = "xterm-256color"

[font]
builtin_box_drawing = true
size = 16.0

[font.bold]
style = "Bold"

[font.italic]
style = "Bold Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[[mouse.bindings]]
action = "Copy"
mouse = "Right"

[scrolling]
history = 5000
multiplier = 3

# Performance optimizations for Claude CLI
[terminal]
osc52 = "CopyPaste"  # Better clipboard performance

[window]
blur = false  # Disable blur for better performance
# PROJECT: alacritty_transparency
opacity = 1.0
decorations = "none"
startup_mode = "Maximized"
dynamic_padding = false  # Reduce redraws
[window.dimensions]
columns = 133
lines = 40

[window.padding]
x = 5
y = 5
