# /home/decoder/.config/tmuxinator/eve.yml (symlinked from dotfiles)
#
# Dedicated EVE Online intel session.
#  - Background: NATS bridge + GTK widget (launched via on_project_start;
#    logs to /tmp; reaped via on_project_stop)
#  - Window 1 `klod` : long-running Klod Claude session
#  - Window 2 `log`  : foreground daemon log (chatlog tail + ESI pollers + router)
#  - Window 3 `intel`: ad-hoc shells in the eve-info skill + eve scripts dir
#
# Start: tmuxinator start eve
# Stop:  M-e (kill_tmux_session.sh routes through `tmuxinator stop eve`)

name: eve
root: ~/dev/

# Launch infra processes (widget + bridge) that aren't tied to any pane.
# After widget appears, move it to workspace 2 where EVE runs (EWMH 0-indexed
# -> -t 1). Best-effort: retry briefly while the window manager picks it up.
on_project_start: |
  mkdir -p ~/.config/eve-route
  nohup python3 ~/.claude/mcp-servers/code-execution/skills/eve/klod_widget.py >/tmp/klod_widget.log 2>&1 &
  nohup python3 ~/.claude/mcp-servers/code-execution/skills/eve/eve_fleet_bridge.py >/tmp/eve_fleet_bridge.log 2>&1 &
  (
    for _ in 1 2 3 4 5 6 7 8; do
      wmctrl -r "Klod" -t 1 2>/dev/null && exit 0
      sleep 1
    done
  ) >/dev/null 2>&1 &

# Reap infra processes the user can't see; remove the widget lockfile so a
# clean restart can take it. Fires on `tmuxinator stop` (which __kill_tmux_session.sh
# now routes through for tmuxinator-managed sessions).
on_project_stop: |
  pkill -TERM -f 'mcp-servers/code-execution/skills/eve/klod_widget\.py' 2>/dev/null || true
  pkill -TERM -f 'mcp-servers/code-execution/skills/eve/eve_fleet_bridge\.py' 2>/dev/null || true
  pkill -TERM -f 'mcp-servers/code-execution/skills/eve/daemon\.py' 2>/dev/null || true
  rm -f ~/.config/eve-route/klod_widget.lock 2>/dev/null || true

windows:
  - klod:
      # Long-running Klod Claude session (subscribed to eve-fleet agent group).
      panes:
        - ~/.claude/scripts/__claude_with_monitor.sh --system-prompt-file ~/.claude/system-prompts/eve-companion-system-prompt.md

  - log:
      # Foreground daemon log so the user can see chatlog parses, routed
      # events, and rate-limit decisions in real time.
      panes:
        - python3 ~/.claude/mcp-servers/code-execution/skills/eve/daemon.py --log-level INFO

  - intel:
      # Ad-hoc shells for klod CLI, eve-info script runs, ring inspection.
      layout: even-horizontal
      panes:
        - cd ~/.claude/skills/eve-info && $SHELL
        - cd ~/.claude/mcp-servers/code-execution/skills/eve && $SHELL
