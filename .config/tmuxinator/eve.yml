# /home/decoder/.config/tmuxinator/eve.yml (symlinked from dotfiles)
#
# Dedicated EVE Online intel session.
#  - Background: NATS bridge + GTK widget (launched via on_project_start;
#    logs to /tmp; reaped via on_project_stop)
#  - Window 1 `klod` : long-running Klod Claude session
#  - Window 2 `log`  : foreground daemon log (chatlog tail + ESI pollers + router)
#  - Window 3 `intel`: ad-hoc shells in the eve-info skill + eve scripts dir
#
# Start: tmuxinator start eve
# Stop:  M-e (kill_tmux_session.sh routes through `tmuxinator stop eve`)

name: eve
root: ~/dev/

# Launch infra processes (widget + bridge) that aren't tied to any pane.
# The widget self-places on workspace 2 via a GTK map-event handler (see
# klod_widget.py `_on_first_map`); no external wmctrl retry needed — the
# previous backgrounded retry loop died with the parent shell, leaving the
# widget on whichever workspace happened to be active.
on_project_start: |
  mkdir -p ~/.config/eve-route
  nohup python3 ~/.claude/mcp-servers/code-execution/skills/eve/klod_widget.py >/tmp/klod_widget.log 2>&1 &
  nohup python3 ~/.claude/mcp-servers/code-execution/skills/eve/eve_fleet_bridge.py >/tmp/eve_fleet_bridge.log 2>&1 &

# Reap infra processes the user can't see; remove the widget lockfile so a
# clean restart can take it. Fires on `tmuxinator stop` (which __kill_tmux_session.sh
# routes through for tmuxinator-managed sessions). Plain `tmux kill-session`
# bypasses this hook entirely — that path leaks dangling processes.
#
# Cleanup order is daemon → bridge → widget so the daemon stops writing to the
# downstream FIFOs before their readers die. SIGTERM gets a 2s grace, then
# SIGKILL clears any straggler (pkill -TERM occasionally returns success but
# leaves the process alive — observed 2026-05-24).
on_project_stop: |
  # 1. Graceful stop in dependency order.
  pkill -TERM -f 'mcp-servers/code-execution/skills/eve/klod_local_ocr\.py' 2>/dev/null || true
  pkill -TERM -f 'mcp-servers/code-execution/skills/eve/daemon\.py' 2>/dev/null || true
  pkill -TERM -f 'mcp-servers/code-execution/skills/eve/eve_fleet_bridge\.py' 2>/dev/null || true
  pkill -TERM -f 'mcp-servers/code-execution/skills/eve/klod_widget\.py' 2>/dev/null || true
  sleep 2
  # 2. Force-kill anything that ignored SIGTERM.
  pkill -KILL -f 'mcp-servers/code-execution/skills/eve/klod_local_ocr\.py' 2>/dev/null || true
  pkill -KILL -f 'mcp-servers/code-execution/skills/eve/daemon\.py' 2>/dev/null || true
  pkill -KILL -f 'mcp-servers/code-execution/skills/eve/eve_fleet_bridge\.py' 2>/dev/null || true
  pkill -KILL -f 'mcp-servers/code-execution/skills/eve/klod_widget\.py' 2>/dev/null || true
  # 3. Remove ephemeral state. Each owning process mkfifo's its read-side on next
  #    start (daemon→control, widget→widget, bridge→eve-fleet). The widget lock
  #    must be cleared or the next widget launch refuses to start.
  #    KEEP persistent state: badactors.json, contacts.json, router.yaml,
  #    tokens.json, discord.yaml, STATUS.md, widget.pos, notify.log.
  rm -f ~/.config/eve-route/control.fifo \
        ~/.config/eve-route/widget.fifo \
        ~/.config/eve-route/eve-fleet.fifo \
        ~/.config/eve-route/klod_widget.lock 2>/dev/null || true
  # 4. Verify. Loud warning beats silent leak.
  if pgrep -f 'mcp-servers/code-execution/skills/eve/(klod_widget|eve_fleet_bridge|daemon)\.py' >/dev/null 2>&1; then
    echo "[eve cleanup] WARNING: processes still alive after SIGKILL:" >&2
    pgrep -af 'mcp-servers/code-execution/skills/eve/(klod_widget|eve_fleet_bridge|daemon)\.py' >&2
  fi

windows:
  - klod:
      # Long-running Klod Claude session. The `/ops-klod` slash command is
      # the initial prompt — invoking the ops-klod skill binds the session
      # to the eve-fleet agent group and runs Klod's bootstrap (mirrors the
      # `-- "/ops-triage-agent"` pattern used by the task tmuxinator session).
      panes:
        - ~/.claude/scripts/__claude_with_monitor.sh --system-prompt-file ~/.claude/system-prompts/eve-companion-system-prompt.md -- "/ops-klod"

  - log:
      # Foreground daemon log so the user can see chatlog parses, routed
      # events, and rate-limit decisions in real time.
      panes:
        - python3 ~/.claude/mcp-servers/code-execution/skills/eve/daemon.py --log-level INFO

  - local-ocr:
      # Local-pane OCR poller. Gated on ~/.config/eve-route/trackers.json — the
      # same list klodctl track add/remove writes. Per-char calibration lives in
      # ~/.config/eve-route/local-crops.json. Emits +1 alerts as
      # `local_unknown_in_system` events direct to the widget.
      # Activate a char:  klod track add "Tide Mende"
      # Calibrate a char: sleep 3 && python3 ~/.claude/mcp-servers/code-execution/skills/eve/klod_local_cal.py --char "Tide Mende"
      panes:
        - python3 ~/.claude/mcp-servers/code-execution/skills/eve/klod_local_ocr.py

  - intel:
      # Ad-hoc shells for klod CLI, eve-info script runs, ring inspection.
      layout: even-horizontal
      panes:
        - cd ~/.claude/skills/eve-info && $SHELL
        - cd ~/.claude/mcp-servers/code-execution/skills/eve && $SHELL
