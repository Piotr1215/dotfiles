## Logitech PRO X Wireless — form_factor=headphones suppresses gsd-media-keys dialog,
## profile priority rule keeps output+input so mic still works.

monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00"
      }
    ]
    actions = {
      update-props = {
        device.form_factor = "headphones"
      }
    }
  }
]

device.profile.priority.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00"
      }
    ]
    actions = {
      update-props = {
        priorities = [ "output:analog-stereo+input:mono-fallback" ]
      }
    }
  }
]
