## Suppress gsd-media-keys AudioDeviceSelection dialog for all audio devices.
## Without form_factor, gsd-media-keys shows selection dialog on device re-evaluation.

monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00"
      }
    ]
    actions = {
      update-props = {
        device.form_factor = "headphones"
      }
    }
  }
  {
    matches = [
      {
        device.name = "~alsa_card.usb-eMeet_Tech_HD_Webcam_eMeet_C980*"
      }
    ]
    actions = {
      update-props = {
        device.form_factor = "webcam"
      }
    }
  }
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_80_1f.3"
      }
    ]
    actions = {
      update-props = {
        device.form_factor = "internal"
      }
    }
  }
]

device.profile.priority.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00"
      }
    ]
    actions = {
      update-props = {
        priorities = [ "output:analog-stereo+input:mono-fallback" ]
      }
    }
  }
]
