## Force Logitech PRO X Wireless to Headset profile (output + mic)
## Override form_factor so gsd-media-keys doesn't trigger AudioDeviceSelection dialog

monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00"
      }
    ]
    actions = {
      update-props = {
        device.form_factor = "headphones"
      }
    }
  }
]

device.profile.priority.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.usb-Logitech_PRO_X_Wireless_Gaming_Headset-00"
      }
    ]
    actions = {
      update-props = {
        priorities = [ "output:analog-stereo+input:mono-fallback" ]
      }
    }
  }
]
